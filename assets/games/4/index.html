<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打地鼠</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(160deg, #1b4332 0%, #2d6a4f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      color: #fff;
    }

    h1 { font-size: 1.7rem; margin: 10px 0 4px; letter-spacing: 2px; text-shadow: 0 2px 6px rgba(0,0,0,.4); }
    .desc { color: #a8d5b5; font-size: .83rem; margin-bottom: 14px; }

    /* 狀態列 */
    .hud {
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,.3);
      border-radius: 30px;
      padding: 8px 24px;
      margin-bottom: 18px;
      font-size: 1rem;
      font-weight: 700;
    }
    .hud-item { display: flex; flex-direction: column; align-items: center; }
    .hud-label { font-size: .65rem; color: #a8d5b5; letter-spacing: 1px; text-transform: uppercase; }
    .hud-val { font-size: 1.4rem; }
    #timer-val { color: #f1c40f; }
    #score-val { color: #69db7c; }
    #miss-val  { color: #ff8787; }

    /* 9 格地鼠洞 */
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 100px);
      gap: 12px;
      margin-bottom: 20px;
    }

    .hole {
      background: #1b4332;
      border-radius: 50% 50% 8px 8px / 40% 40% 8px 8px;
      border: 3px solid #1a3a2a;
      position: relative;
      overflow: hidden;
      cursor: default;
      box-shadow: inset 0 8px 16px rgba(0,0,0,.6), 0 4px 10px rgba(0,0,0,.3);
    }

    .mole {
      position: absolute;
      bottom: -100%;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 70px;
      cursor: pointer;
      user-select: none;
      transition: bottom .12s ease-out;
      font-size: 52px;
      text-align: center;
      line-height: 70px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.5));
    }
    .mole.up   { bottom: 5px; }
    .mole.whacked { font-size: 48px; filter: brightness(2) drop-shadow(0 0 8px #f1c40f); pointer-events: none; }

    /* 炸開特效標籤 */
    .pop {
      position: absolute;
      font-size: 1.1rem;
      font-weight: 900;
      color: #f1c40f;
      text-shadow: 0 2px 4px rgba(0,0,0,.6);
      pointer-events: none;
      animation: floatUp .6s forwards;
      z-index: 10;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform: translateY(0) scale(1); }
      100% { opacity:0; transform: translateY(-40px) scale(1.3); }
    }

    /* 按鈕 */
    #btn-start {
      padding: 12px 40px;
      background: linear-gradient(135deg, #f9c74f, #f3722c);
      color: #1b1b1b;
      border: none;
      border-radius: 30px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(249,199,79,.4);
      transition: transform .15s;
    }
    #btn-start:hover  { transform: translateY(-2px); }
    #btn-start:disabled { background: #444; color: #777; cursor: default; transform: none; box-shadow: none; }

    /* 結果覆蓋層 */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #overlay.show { display: flex; }
    .overlay-box {
      background: #1b4332;
      border: 2px solid #40916c;
      border-radius: 20px;
      padding: 30px 40px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    .overlay-box h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .final-score { font-size: 3rem; font-weight: 900; color: #69db7c; }
    .final-label { color: #a8d5b5; font-size: .9rem; margin-bottom: 18px; }
    .final-rank  { font-size: 1.1rem; margin-bottom: 20px; color: #f1c40f; }
    .overlay-btn {
      padding: 10px 32px;
      background: linear-gradient(135deg,#f9c74f,#f3722c);
      color: #1b1b1b;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin: 0 6px;
    }
  </style>
</head>
<body>

<h1>🐭 打地鼠</h1>
<p class="desc">30 秒內打越多地鼠分數越高！錯過 3 隻就扣分哦</p>

<div class="hud">
  <div class="hud-item">
    <span class="hud-label">剩餘時間</span>
    <span class="hud-val" id="timer-val">30</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">分數</span>
    <span class="hud-val" id="score-val">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-label">漏打</span>
    <span class="hud-val" id="miss-val">0</span>
  </div>
</div>

<div id="grid"></div>
<button id="btn-start">開始遊戲</button>
<div id="overlay">
  <div class="overlay-box">
    <h2>⏱ 時間到！</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="final-label">分</div>
    <div class="final-rank" id="final-rank"></div>
    <button class="overlay-btn" id="btn-again">再玩一次</button>
    <button class="overlay-btn" id="btn-quit" style="background:#334;color:#aaa;">結束</button>
  </div>
</div>

<script>
  const TOTAL_TIME = 30;
  const MOLES = ['🐭','🐹','🐱','🦊','🐻'];

  let score = 0, misses = 0, timeLeft = TOTAL_TIME;
  let gameTimer = null, spawnTimer = null, running = false;
  let holes = [], moleTimers = [];

  const grid      = document.getElementById('grid');
  const timerVal  = document.getElementById('timer-val');
  const scoreVal  = document.getElementById('score-val');
  const missVal   = document.getElementById('miss-val');
  const overlay   = document.getElementById('overlay');
  const finalScore= document.getElementById('final-score');
  const finalRank = document.getElementById('final-rank');
  const btnStart  = document.getElementById('btn-start');
  const btnAgain  = document.getElementById('btn-again');
  const btnQuit   = document.getElementById('btn-quit');

  // 建立 9 個洞
  function buildGrid() {
    grid.innerHTML = '';
    holes = [];
    moleTimers = [];
    for (let i = 0; i < 9; i++) {
      const hole = document.createElement('div');
      hole.className = 'hole';
      const mole = document.createElement('div');
      mole.className = 'mole';
      mole.dataset.idx = i;
      hole.appendChild(mole);
      grid.appendChild(hole);
      holes.push({ hole, mole, up: false });
      moleTimers.push(null);
    }
  }

  function rankMsg(s) {
    if (s >= 25) return '🏆 傳說地鼠獵人！';
    if (s >= 18) return '🥇 超強！手速一流';
    if (s >= 12) return '🥈 不錯！繼續練習';
    if (s >= 6)  return '🥉 加油，還有進步空間';
    return '💪 下次一定更好！';
  }

  function popText(hole, txt) {
    const el = document.createElement('div');
    el.className = 'pop';
    el.textContent = txt;
    el.style.left  = (30 + Math.random()*40) + 'px';
    el.style.top   = '20px';
    hole.appendChild(el);
    setTimeout(() => el.remove(), 650);
  }

  function showMole(idx) {
    if (!running) return;
    const { hole, mole } = holes[idx];
    if (holes[idx].up) return;

    const face = MOLES[Math.floor(Math.random() * MOLES.length)];
    mole.textContent = face;
    mole.className = 'mole up';
    holes[idx].up = true;

    // 地鼠停留時間（隨遊戲進行縮短）
    const stayMs = Math.max(600, 1200 - (TOTAL_TIME - timeLeft) * 18);

    moleTimers[idx] = setTimeout(() => {
      if (holes[idx].up) {
        hideMole(idx, true); // 沒打到
      }
    }, stayMs);

    mole.onclick = () => {
      if (!running || !holes[idx].up) return;
      clearTimeout(moleTimers[idx]);
      mole.className = 'mole whacked';
      mole.textContent = '💥';
      popText(hole, '+10');
      score += 10;
      scoreVal.textContent = score;
      holes[idx].up = false;
      setTimeout(() => { mole.className = 'mole'; }, 300);
    };
  }

  function hideMole(idx, missed) {
    holes[idx].up = false;
    holes[idx].mole.className = 'mole';
    if (missed) {
      misses++;
      missVal.textContent = misses;
      if (score > 0) { score = Math.max(0, score - 5); scoreVal.textContent = score; }
      popText(holes[idx].hole, '-5');
    }
  }

  function spawnRandom() {
    if (!running) return;
    // 找沒在顯示的洞
    const available = holes.map((h,i) => (!h.up ? i : -1)).filter(i => i >= 0);
    if (available.length > 0) {
      const idx = available[Math.floor(Math.random() * available.length)];
      showMole(idx);
    }
    // 同時顯示 1~2 隻（後期加快）
    const extra = timeLeft < 15 && available.length > 1 && Math.random() < .4;
    if (extra) {
      const idx2 = available.filter(i => i !== holes.findIndex((_,ii)=>ii===available[0]))[Math.floor(Math.random()*(available.length-1))];
      if (idx2 !== undefined) setTimeout(() => showMole(idx2), 150);
    }
    const interval = Math.max(500, 900 - (TOTAL_TIME - timeLeft) * 12);
    spawnTimer = setTimeout(spawnRandom, interval);
  }

  function startGame() {
    score = 0; misses = 0; timeLeft = TOTAL_TIME; running = true;
    scoreVal.textContent = 0;
    missVal.textContent = 0;
    timerVal.textContent = TOTAL_TIME;
    overlay.classList.remove('show');
    btnStart.disabled = true;
    buildGrid();

    spawnRandom();

    gameTimer = setInterval(() => {
      timeLeft--;
      timerVal.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    running = false;
    clearInterval(gameTimer);
    clearTimeout(spawnTimer);
    moleTimers.forEach(t => clearTimeout(t));
    holes.forEach(h => { h.mole.className = 'mole'; h.up = false; });

    finalScore.textContent = score;
    finalRank.textContent = rankMsg(Math.floor(score / 10));
    overlay.classList.add('show');

    sendResultToParent('完成', score + ' 分');
  }

  function sendResultToParent(result, score) {
    if (window.opener) {
      window.opener.receiveGameResult({
        game: '打地鼠',
        data: { result, score }
      });
    } else {
      console.warn('無法傳送結果，請確認是否由主頁面開啟');
    }
  }

  btnStart.addEventListener('click', startGame);
  btnAgain.addEventListener('click', startGame);
  btnQuit.addEventListener('click', () => { overlay.classList.remove('show'); btnStart.disabled = false; window.close(); });

  buildGrid();
</script>
</body>
</html>
